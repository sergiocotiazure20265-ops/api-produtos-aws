name: API Produtos CI/CD

on:
  push:
    branches: 
      - main

jobs:
  build:
    name: Compilação do código
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build do projeto com Maven
      run: mvn clean package -DskipTests

    - name: Upload do artefato
      uses: actions/upload-artifact@v4
      with:
        name: api-produtos-aws
        path: target/*.jar

  deploy:
    name: Implantação do projeto
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Download do artefato
      uses: actions/download-artifact@v4
      with:
        name: api-produtos-aws

    - name: Configurar credenciais AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Preparar arquivo para deploy no Elastic Beanstalk
      run: |
        mkdir -p deploy/.ebextensions
        
        # Encontrar o JAR do artefato downloadado
        JAR_FILE=$(find . -maxdepth 1 -name "*.jar" -type f)
        if [ -z "$JAR_FILE" ]; then
          echo "Erro: JAR não encontrado"
          ls -la
          exit 1
        fi
        
        cp "$JAR_FILE" deploy/app.jar
        
        # Criar arquivo de configuração do Elastic Beanstalk
        cat > deploy/.ebextensions/java.config <<'EOF'
        option_settings:
          aws:elasticbeanstalk:container:java:staticfiles:
            /static: /static
          aws:elasticbeanstalk:application:environment:
            JAVA_OPTS: "-Xmx256m -Xms128m"
            SERVER_PORT: "5000"
        
        commands:
          01_rename_jar:
            command: "mv app.jar application.jar || true"
            cwd: /var/app/current
        
        container_commands:
          01_run_jar:
            command: "java -Dserver.port=5000 -jar application.jar"
            leader_only: false
        EOF
        
        # Criar ZIP
        cd deploy
        zip -r ../api-produtos-aws.zip .

    - name: Deploy no Elastic Beanstalk
      run: |
        pip install awsebcli --quiet
        
        # Criar arquivo de configuração do EB
        mkdir -p .elasticbeanstalk
        cat > .elasticbeanstalk/config.yml <<EOF
        branch-defaults:
          main:
            environment: Api-produtos-aws-env
        environment-defaults:
          Api-produtos-aws-env:
            branch: null
            repository: null
        global:
          application_name: api-produtos-aws
          default_region: us-east-2
          include_git_submodules: true
          instance_profile: null
          platform_name: null
          platform_version: null
          sc: git
          workspace_type: Application
        EOF
        
        eb deploy Api-produtos-aws-env
