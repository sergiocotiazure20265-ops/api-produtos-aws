# Nome do workflow que será exibido no GitHub Actions
name: Workflow AWS - Pipeline CI/CD

# Evento que dispara a execução do workflow
on:
  # Executa o workflow quando houver push no repositório
  push:
    # Define que o workflow será executado apenas na branch main
    branches:
      - main

# Lista de trabalhos que serão executados no workflow
jobs:

  # Primeiro trabalho: build do projeto
  build:
    # Nome amigável do job de build
    name: Build do projeto Java 25

    # Máquina virtual onde o job será executado
    runs-on: ubuntu-latest

    # Passos executados dentro do job de build
    steps:

      # Faz o checkout do código-fonte do repositório
      - name: Baixar código-fonte
        uses: actions/checkout@v4

      # Configura o Java 21 no ambiente do GitHub Actions
      - name: Configurar Java 25
        uses: actions/setup-java@v4
        with:
          # Define a distribuição do JDK
          distribution: temurin

          # Define a versão do Java usada no projeto
          java-version: '25'

      # Dá permissão de execução ao Maven Wrapper, caso o projeto use mvnw
      - name: Permitir execução do Maven Wrapper
        run: chmod +x mvnw

      # Executa o build da aplicação Spring Boot sem rodar os testes
      - name: Build da aplicação sem testes
        run: ./mvnw clean package -DskipTests

      # Exibe uma mensagem indicando que o build foi concluído
      - name: Mensagem de build concluído
        run: echo "Build do projeto Java 25 com Spring Boot concluído com sucesso."

      # Publica o arquivo JAR gerado como artefato para ser usado no job de deploy
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/*.jar

  # Segundo trabalho: deploy do projeto
  deploy:
    # Nome amigável do job de deploy
    name: Deploy na AWS

    # Máquina virtual onde o job será executado
    runs-on: ubuntu-latest

    # Define que o deploy só será executado depois do build
    needs: build

    # Passos executados dentro do job de deploy
    steps:

      # Exibe uma mensagem simulando o início da implantação
      - name: Descrição
        run: echo "Implantando a aplicação em produção."

      # Faz o download do artefato JAR gerado no job de build
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-file

      # Lista os arquivos baixados no ambiente do GitHub Actions
      - name: Listar artefatos baixados
        run: ls -la

      # Renomeia o arquivo JAR baixado para o nome esperado no deploy
      - name: Renomear arquivo JAR
        run: |
          JAR_FILE=$(ls *.jar)
          echo "Arquivo JAR baixado: $JAR_FILE"
          mv $JAR_FILE api-produtos-aws.jar

      # Faz o deploy da aplicação no AWS Elastic Beanstalk
      - name: Fazer deploy no Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v20
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: api-produtos-aws
          environment_name: Api-produtos-aws-env
          region: us-east-2
          deployment_package: api-produtos-aws.jar
          version_label: ${{ github.sha }}

      # Remove arquivos temporários gerados durante o deploy
      - name: Limpar arquivos temporários
        run: rm -f *.jar