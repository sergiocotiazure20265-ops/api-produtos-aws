name: API Produtos CI/CD

on:
  push:
    branches: 
      - main

jobs:
  build:
    name: Compilação do código
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build do projeto com Maven
      run: mvn clean package -DskipTests

    - name: Upload do artefato
      uses: actions/upload-artifact@v4
      with:
        name: api-produtos-aws
        path: target/*.jar

  deploy:
    name: Implantação do projeto
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Download do artefato
      uses: actions/download-artifact@v4
      with:
        name: api-produtos-aws

    - name: Configurar credenciais AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Preparar arquivo para deploy no Elastic Beanstalk
      run: |
        mkdir -p deploy
        cp *.jar deploy/Procfile
        cd deploy
        zip -r ../api-produtos-aws.zip .

    - name: Deploy no Elastic Beanstalk
      run: |
        pip install awsebcli --quiet
        eb init api-produtos-aws --platform java --region us-east-2 --skip-initial-commit
        eb deploy Api-produtos-aws-env
